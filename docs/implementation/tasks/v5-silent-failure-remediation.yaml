title: Silent-Failure Remediation (Systems Architecture Audit 2026-07-11)
audit: docs/audits/systems-architecture-audit-2026-07-11.md
note: >
  Closes the 10 silent-failure findings (SF-1..SF-10) from the systems architecture audit.
  Root cause: collaboration contracts are version-pinned but not version-managed. The P0
  block restores actual enforcement (agent governance + gate consistency + version propagation);
  P1 prevents recurrence; P2 removes structural fragility.
phases:
- id: phase-P0-restore-enforcement
  title: 'P0 — Restore actual enforcement (agent governance + gate consistency + refs)'
  horizon: v3.4.0
  tasks:
  - id: SFR-001
    finding: SF-4
    title: Align job 4 (run-all-policies.py) exit logic with BLOCK-level gate so job 4 and job 7 agree
    status: done
  - id: SFR-002
    finding: SF-2
    title: Add AGT controls to PROF-TERRAFORM-ROOT-V1, PROF-TERRAFORM-MODULE-V1, PROF-SERVICE-V1 gates (agent-scoped)
    status: done
  - id: SFR-003
    finding: SF-3
    title: Add 'agent' technology_context to platform-infrastructure manifest
    status: done
  - id: SFR-004
    finding: SF-3
    title: Add manifest-completeness policy (CAT-003) — repo with agent surface must declare agent context
    status: done
  - id: SFR-005
    finding: SF-2/SF-4
    title: Full CI validation, merge, release compliance vX.4.0 with P0 fixes
    status: not-started
  - id: SFR-006
    finding: SF-1
    title: Bump platform-modules/infrastructure/services compliance refs to vX.4.0 and triage surfaced violations
    status: not-started
- id: phase-P1-prevent-recurrence
  title: 'P1 — Prevent recurrence (registry + automated propagation + drift detection)'
  horizon: v3.5.0
  tasks:
