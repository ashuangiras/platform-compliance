    status: not-started
  - id: SFR-009
    finding: SF-1
    title: Add SUP control — governed repos must track compliance within one minor version of latest
    status: not-started
  - id: SFR-010
    finding: SF-5
    title: Agent-surface baseline policy + forge reconcile (detect + close agent config drift)
    status: not-started
- id: phase-P2-reduce-fragility
  title: 'P2 — Reduce structural fragility (composition + module refs + robust validate)'
