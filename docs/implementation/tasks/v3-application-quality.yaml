  title: 'P5 — Library: reuse QUA/TST, relax RUN/NET/OBS, PROF-LIBRARY-V1'
  horizon: v2.0.0
  tasks:
  - id: PC-0254
    title: Create PROF-LIBRARY-V1 (inherits PROF-BASE; QUA/TST; no RUN/NET/OBS)
    status: not_started
  - id: PC-0255
    title: Full CI validation of P5; merge; cut v2.0.0 (coverage TST-002 -> block)
