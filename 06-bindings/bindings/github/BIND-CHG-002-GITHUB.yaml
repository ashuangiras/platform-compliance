$schema: "../../schemas/binding.schema.json"

id: BIND-CHG-002-GITHUB
control_id: CHG-002
technology_context: github
introduced_date: "2026-07-08"
status: active

specification: >
  Every Git tag that represents a release (any tag matching the pattern
  v{MAJOR}.{MINOR}.{PATCH}) must have a corresponding release record file
  in 09-assessments/releases/{tag}.yaml.

  The release record file must:
  1. Exist at the path 09-assessments/releases/{tag}.yaml in the repository
     at the tagged commit
  2. Be valid YAML
  3. Contain the required fields: id, schema_version, release_date,
     change_record_ids (non-empty), gate_assessment_id, release_summary,
     breaking_changes, released_by

  The gate_assessment_id must reference an assessment report that exists
  in 09-assessments/reports/.

observable_artifact: >
  Repository file tree at tag commit:
  - Presence of 09-assessments/releases/{tag}.yaml
  - File is valid YAML with all required fields populated

  The tag name is derived from the git ref that triggered the release gate
  workflow (refs/tags/v*).

policy_check_ids:
  - POL-CHG-002-GITHUB-001
