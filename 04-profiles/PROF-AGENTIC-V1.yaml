$schema: ../schemas/profile.schema.json
id: PROF-AGENTIC-V1
name: Agentic Configuration Profile v1
description: 'Opt-in overlay profile for repositories that ship AI coding-agent configuration
  (the "agent" technology context). Governs both the secure setup AND the effective, high-quality
  usage of agent configuration: single-sourced instructions, valid frontmatter, secret-free and
  pinned MCP servers, discoverable descriptions, least-privilege tools, scoped instructions,
  pre/post-flight discipline, a safety hook, multi-agent routing, per-agent role clarity, and
  complete repository instructions. Every control blocks. A repository declares this profile in
  addition to its primary profile (e.g. PROF-PLATFORM-V1 or PROF-SERVICE-V1).

  '
version: 2.0.0
applicable_to:
- platform-repo
- service
- library
- terraform-module
- terraform-root
- frontend-app
- documentation
introduced_date: '2026-07-10'
introduced_by: platform-team
status: active
categories:
  mandatory:
    description: 'All agent-configuration controls. Every one blocks at the merge and release
      gates for any repository declaring the agent context — setup, security, and effectiveness
      alike. The bar is deliberately high.

      '
    controls:
    - id: AGT-001
    - id: AGT-002
    - id: AGT-003
    - id: AGT-004
    - id: AGT-005
    - id: AGT-006
    - id: AGT-007
    - id: AGT-008
    - id: AGT-009
    - id: AGT-010
    - id: AGT-011
    - id: AGT-012
    - id: AGT-013
    - id: AGT-014
    - id: AGT-015
  manual_initially:
    description: 'No manually-attested agent controls; all AGT controls are automated.

      '
    controls: []
  deferred:
    description: 'No deferred agent controls; the full AGT set is enforced.

      '
    controls: []
gates:
