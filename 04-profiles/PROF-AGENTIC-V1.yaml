notes: >
  Opt-in overlay. Enforcement is driven by the 'agent' technology context: a repository that
  declares the context runs the full AGT suite (AGT-001..012) in CI, all blocking.
  platform-compliance itself declares the context and this profile, dogfooding the agent operating
  layer it defines — and passes every control.
