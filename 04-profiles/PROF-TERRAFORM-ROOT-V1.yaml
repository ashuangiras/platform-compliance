$schema: ../schemas/profile.schema.json
id: PROF-TERRAFORM-ROOT-V1
name: Terraform Root Module Profile v1
description: 'Compliance profile for Terraform root configurations (deployable infrastructure).
  Inherits all controls from PROF-TERRAFORM-MODULE-V1 and adds the requirement for
  a terraform plan output to be reviewed before any apply is executed. This profile
  governs production infrastructure repositories.

  '
version: 1.0.0
inherits: PROF-TERRAFORM-MODULE-V1
applicable_to:
- terraform-root
introduced_date: '2026-07-09'
status: active
categories:
  mandatory:
    description: 'All mandatory controls from PROF-TERRAFORM-MODULE-V1 plus IAC-002
      (plan-before-apply) which is specific to deployable root configurations.

      '
    controls:
    - id: SRC-001
    - id: SRC-002
    - id: SEC-001
    - id: SEC-002
    - id: DOC-001
    - id: CHG-002
    - id: IAC-001
    - id: SUP-001
    - id: SEC-003
    - id: IAC-002
    - id: IAC-004
  manual_initially:
    description: 'Controls accepted via human attestation.

      '
    controls:
    - id: SRC-003
    - id: IAC-003
    - id: IAC-005
  deferred:
    description: 'Planned controls not yet enforced in this profile version.

      '
    controls:
    - id: SRC-004
    - id: SUP-003
  not_applicable:
    description: 'Controls that do not apply to Terraform root configurations.

      '
    controls:
    - id: RUN-001
      rationale: Container-specific. Terraform root modules do not build container
        images.
    - id: RUN-002
      rationale: Container-specific.
    - id: RUN-003
      rationale: Container-specific.
    - id: SUP-002
      rationale: Container image pinning. Terraform root modules do not build images.
    - id: OBS-001
      rationale: Service health check. Not applicable to infrastructure configurations.
    - id: OBS-002
      rationale: Structured logging. Not applicable to infrastructure configurations.
    - id: BAK-001
      rationale: Stateful service backup. Infrastructure state is managed by Terraform
        backend (governed separately).
    - id: NET-001
      rationale: Service ingress policy. Network configuration is declared as Terraform
        resources, not via this control.
    - id: CHG-001
      rationale: Platform-repo change tracking. Not applicable to infrastructure repos.
    - id: DOC-002
      rationale: Architecture decision records. Not applicable to infrastructure repos.
    - id: INC-001
      rationale: Service incident postmortem. Not applicable to infrastructure configurations.
gates:
  merge_gate:
    description: 'Evaluated before any infrastructure change PR is merged. The terraform
      plan is reviewed as part of the PR diff.

      '
    required_controls:
    - id: SRC-001
      enforcement: block
    - id: SRC-002
      enforcement: block
    - id: SEC-001
      enforcement: block
    - id: SEC-002
      enforcement: block
    - id: IAC-001
      enforcement: block
    - id: SUP-001
      enforcement: block
    - id: SRC-003
      enforcement: warn
    - id: DOC-001
      enforcement: warn
    - id: IAC-003
      enforcement: warn
    - id: IAC-004
      enforcement: block
    # ── Audit-driven hardening controls (ARCH-AUDIT-2026-07-11) ─────────────
    - id: SEC-012
      enforcement: block
    - id: SEC-013
      enforcement: block
    - id: SEC-014
      enforcement: block
    - id: NET-002
      enforcement: block
    - id: IAC-003b
      enforcement: block
    - id: IAC-006
      enforcement: block
    - id: IAC-007
      enforcement: block
    - id: RUN-008
      enforcement: block
    - id: RUN-009
      enforcement: block
    - id: RUN-009b
      enforcement: block
    # ── Manifest completeness (CAT-003 / SF-3) — always block ──
    - id: CAT-003
      enforcement: block
    # ── Agent governance (ADR-0017 / SF-2) — block on agent-context repos ──
    - id: AGT-001
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-002
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-003
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-004
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-005
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-006
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-007
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-008
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-009
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-010
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-011
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-012
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-013
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-014
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"
    - id: AGT-015
      enforcement: block
      scope_condition: "'agent' in repository.technology_contexts"

  release_gate:
    description: 'Evaluated before an infrastructure version tag is published. Plan-before-apply
      is required at release; no infrastructure applies may happen without an approved
      plan artifact.

      '
    required_controls:
    - id: SRC-001
      enforcement: block
    - id: SRC-002
      enforcement: block
    - id: SEC-001
      enforcement: block
    - id: SEC-002
      enforcement: block
    - id: IAC-001
      enforcement: block
    - id: IAC-002
      enforcement: block
    - id: SUP-001
      enforcement: block
    - id: SEC-003
      enforcement: block
    - id: SRC-003
      enforcement: block
    - id: DOC-001
      enforcement: block
    - id: CHG-002
      enforcement: block
    - id: IAC-003
      enforcement: warn
    - id: IAC-004
      enforcement: block
  deployment_gate:
    description: 'Evaluated before a terraform apply is executed in any environment.
      Plan output must exist and have been reviewed (IAC-002).

      '
    required_controls:
    - id: SRC-001
      enforcement: block
    - id: SEC-001
      enforcement: block
    - id: IAC-001
      enforcement: block
    - id: IAC-002
      enforcement: block
    - id: SUP-001
      enforcement: block
    - id: IAC-004
      enforcement: block
  continuous_audit:
    description: 'Scheduled scanning for secrets, vulnerabilities, and dependency
      drift.

      '
    required_controls:
    - id: SEC-001
      enforcement: notify
    - id: SEC-002
      enforcement: notify
    - id: SEC-003
      enforcement: notify
    - id: SUP-001
      enforcement: notify
    - id: IAC-004
      enforcement: notify
    - id: IAC-005
      enforcement: notify
