$schema: ../schemas/profile.schema.json
id: PROF-GO-SERVICE-V1
name: Go Service Profile v1
description: >
  Compliance profile for Go application services. Inherits all controls from
  PROF-SERVICE-V1 and adds Go-language-specific controls for architecture,
  API governance, observability, supply chain, source hygiene, and documentation
  (ADR-0016 Phase P2). P1 Go controls are blocking merge gates; P2 controls are
  warn-level at v1 with promotion to block planned for v2.

version: 1.0.0
inherits: PROF-SERVICE-V1
applicable_to:
  - service
introduced_date: "2026-07-10"
status: active
categories:
  mandatory:
    description: >
      All controls inherited from PROF-SERVICE-V1 plus Go-specific controls.
      Blocking controls must pass at the merge gate. Warn-level controls
      (enforcement_override: warn) record findings without blocking.
    controls:
      - id: SRC-001
      - id: SRC-002
      - id: SEC-001
      - id: SEC-002
      - id: DOC-001
      - id: CHG-002
      - id: RUN-001
      - id: RUN-002
      - id: SUP-002
      - id: SUP-001
      - id: SEC-003
      - id: OBS-001
      - id: BAK-001
        scope_condition: service.type == 'stateful'
      - id: NET-001
        scope_condition: service.externally_exposed == true
      - id: RUN-004
      - id: RUN-005
      - id: SEC-006
      - id: RUN-006
      - id: RUN-007
      - id: QUA-001
      - id: QUA-002
      - id: QUA-003
      - id: QUA-004
      - id: TST-001
      - id: ARC-003
      - id: API-001
      - id: API-002
      - id: SUP-005
      - id: ARC-001
        enforcement_override: warn
      - id: API-003
        enforcement_override: warn
      - id: OBS-004
        enforcement_override: warn
      - id: SRC-005
        enforcement_override: warn
      - id: TST-002
        enforcement_override: block
      - id: TST-003
        enforcement_override: warn
      - id: DOC-003
        enforcement_override: warn
  manual_initially:
    description: >
      Controls accepted via human attestation until automated tooling is available.
    controls:
      - id: SRC-003
      - id: RUN-003
      - id: OBS-002
      - id: INC-001
        scope_condition: service.type is defined
      - id: OBS-003
  deferred:
    description: >
      Planned controls not yet enforced.
    controls: []
gates:
  merge_gate:
    description: >
      Evaluated before any Go service change PR is merged. Container controls,
      code quality gates, and API specification checks are enforced on every commit.
    required_controls:
      - id: SRC-001
        enforcement: block
      - id: SRC-002
        enforcement: block
      - id: SEC-001
        enforcement: block
      - id: SEC-002
        enforcement: block
      - id: RUN-001
        enforcement: block
      - id: RUN-002
        enforcement: block
      - id: SUP-002
        enforcement: block
      - id: SUP-001
        enforcement: block
      - id: OBS-001
        enforcement: warn
      - id: SRC-003
        enforcement: warn
      - id: DOC-001
        enforcement: warn
      - id: RUN-003
        enforcement: warn
      - id: NET-001
        enforcement: warn
        scope_condition: service.externally_exposed == true
      - id: RUN-004
        enforcement: block
      - id: RUN-005
        enforcement: block
      - id: SEC-006
        enforcement: block
      - id: RUN-006
        enforcement: block
      - id: RUN-007
        enforcement: block
      - id: QUA-001
        enforcement: block
      - id: QUA-002
        enforcement: block
      - id: QUA-003
        enforcement: block
      - id: QUA-004
        enforcement: block
      - id: TST-001
        enforcement: block
      - id: ARC-003
        enforcement: block
      - id: API-001
        enforcement: block
      - id: API-002
        enforcement: block
      - id: SUP-005
        enforcement: block
      - id: ARC-001
        enforcement: warn
      - id: API-003
        enforcement: warn
      - id: OBS-004
        enforcement: warn
      - id: SRC-005
        enforcement: warn
      - id: TST-002
        enforcement: block
      - id: TST-003
        enforcement: warn
      - id: DOC-003
        enforcement: warn
  release_gate:
    description: >
      Evaluated before a Go service version tag is published. All mandatory
      blocking controls must pass plus quality, architecture, and API controls.
    required_controls:
      - id: SRC-001
        enforcement: block
      - id: SRC-002
        enforcement: block
      - id: SEC-001
        enforcement: block
      - id: SEC-002
        enforcement: block
      - id: RUN-001
        enforcement: block
      - id: RUN-002
        enforcement: block
      - id: SUP-002
        enforcement: block
      - id: SUP-001
        enforcement: block
      - id: SEC-003
        enforcement: block
      - id: OBS-001
        enforcement: block
      - id: SRC-003
        enforcement: block
      - id: DOC-001
        enforcement: block
      - id: CHG-002
        enforcement: block
      - id: RUN-003
        enforcement: block
      - id: OBS-002
        enforcement: warn
      - id: BAK-001
        enforcement: block
        scope_condition: service.type == 'stateful'
      - id: NET-001
        enforcement: block
        scope_condition: service.externally_exposed == true
      - id: RUN-004
        enforcement: block
      - id: RUN-005
        enforcement: block
      - id: SEC-006
        enforcement: block
      - id: RUN-006
        enforcement: block
      - id: RUN-007
        enforcement: block
      - id: OBS-003
        enforcement: warn
      - id: QUA-001
        enforcement: block
      - id: QUA-002
        enforcement: block
      - id: QUA-003
        enforcement: block
      - id: QUA-004
        enforcement: block
      - id: TST-001
        enforcement: block
      - id: ARC-003
        enforcement: block
      - id: API-001
        enforcement: block
      - id: API-002
        enforcement: block
      - id: SUP-005
        enforcement: block
      - id: ARC-001
        enforcement: warn
      - id: API-003
        enforcement: warn
      - id: OBS-004
        enforcement: warn
      - id: SRC-005
        enforcement: warn
      - id: TST-002
        enforcement: block
      - id: TST-003
        enforcement: warn
      - id: DOC-003
        enforcement: warn
  deployment_gate:
    description: >
      Evaluated before a Go service deployment proceeds to any environment.
      Container integrity, health declarations, and code quality are mandatory.
    required_controls:
      - id: SRC-001
        enforcement: block
      - id: SEC-001
        enforcement: block
      - id: RUN-001
        enforcement: block
      - id: RUN-002
        enforcement: block
      - id: SUP-002
        enforcement: block
      - id: OBS-001
        enforcement: block
      - id: BAK-001
        enforcement: block
        scope_condition: service.type == 'stateful'
      - id: NET-001
        enforcement: block
        scope_condition: service.externally_exposed == true
      - id: RUN-004
        enforcement: block
      - id: RUN-005
        enforcement: block
      - id: RUN-006
        enforcement: block
      - id: RUN-007
        enforcement: block
      - id: QUA-001
        enforcement: block
      - id: ARC-003
        enforcement: block
      - id: SUP-005
        enforcement: block
  continuous_audit:
    description: >
      Scheduled scanning for secrets, vulnerabilities, dependency drift,
      and supply chain integrity.
    required_controls:
      - id: SEC-001
        enforcement: notify
      - id: SEC-002
        enforcement: notify
      - id: SEC-003
        enforcement: notify
      - id: SUP-002
        enforcement: notify
      - id: SEC-006
        enforcement: notify
      - id: SUP-005
        enforcement: notify
      - id: OBS-004
        enforcement: notify
