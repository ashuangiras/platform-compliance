name: "Self-Compliance Check"

# platform-compliance governs itself with PROF-PLATFORM-V1.
# This workflow runs the compliance pipeline against platform-compliance's
# own repository, validating that the governance root passes its own rules.

# All write permissions declared at the job level (SEC-004).
permissions: read-all

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Release tags (v*) must reach the release-gate job below. Without this
    # trigger the tag push never starts this workflow, so release-gate's
    # `if: startsWith(github.ref, 'refs/tags/v')` guard can never evaluate.
    tags: ['v*']

jobs:
  merge-gate:
    name: "Compliance: Merge Gate"
    # Merge gate runs for PRs and pushes to main only. A tag push (release-gate's
    # trigger) must NOT run the merge gate — key off the PR event / main ref so a
    # tag ref (refs/tags/v*) is explicitly excluded.
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/reusable-compliance.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    with:
      gate: merge_gate
      profile-id: PROF-PLATFORM-V1
      repository-type: platform-repo
      technology-contexts: "github,github-actions,agent"
      has-container-images: false
      # For PRs: use the branch being tested (so new policies in the PR are exercised)
      # For pushes to main: use "main" (the merged result)
      platform-compliance-ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}

  release-gate:
    name: "Compliance: Release Gate"
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-compliance.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    with:
      gate: release_gate
      profile-id: PROF-PLATFORM-V1
      repository-type: platform-repo
      technology-contexts: "github,github-actions,agent"
      has-container-images: false
      platform-compliance-ref: ${{ github.ref_name }}
