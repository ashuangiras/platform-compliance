name: "Release — Package Policy Bundle"

# Runs when a version tag is pushed.
# Packages 07-policies/opa/ as policies.tar.gz, computes SHA-256,
# and uploads both as release assets per ADR-0009.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: write   # needed to upload release assets

jobs:
  package-bundle:
    name: "Package and publish OPA policy bundle"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout at tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Build policies.tar.gz
        run: |
          TAG="${{ github.ref_name }}"
          echo "Building bundle for ${TAG}"

          # Package only the OPA policies subtree
          tar -czf /tmp/policies.tar.gz \
            -C 07-policies/opa \
            .

          # Compute SHA-256 checksum
          cd /tmp
          sha256sum policies.tar.gz > policies.tar.gz.sha256
          echo "Bundle size: $(wc -c < policies.tar.gz) bytes"
          echo "SHA-256: $(cat policies.tar.gz.sha256)"

          # Verify the bundle is a valid tar.gz
          tar -tzf policies.tar.gz | grep -c "\.rego$"
          echo "rego files in bundle"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Create release if it doesn't exist
          if ! gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            PRERELEASE_FLAG=""
            if echo "${TAG}" | grep -q "\-rc\."; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --title "Platform Compliance ${TAG}" \
              --notes "Release ${TAG}. See CHANGELOG.md for details." \
              ${PRERELEASE_FLAG}
            echo "Created release ${TAG}"
          fi

          # Upload bundle and checksum as release assets
          gh release upload "${TAG}" \
            /tmp/policies.tar.gz \
            /tmp/policies.tar.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

          echo "✓ Bundle uploaded to release ${TAG}"
          gh release view "${TAG}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name'
