name: "Release — Package Policy Bundle"

# Runs when a version tag is pushed.
# Packages 07-policies/opa/ as policies.tar.gz, computes SHA-256,
# and uploads both as release assets per ADR-0009.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

# Write permission scoped to job level only (SEC-004).
permissions: read-all

jobs:
  package-bundle:
    name: "Package and publish OPA policy bundle"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout at tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Build policies.tar.gz
        run: |
          TAG="${{ github.ref_name }}"
          echo "Building bundle for ${TAG}"

          # Package only the OPA policies subtree
          tar -czf /tmp/policies.tar.gz \
            -C 07-policies/opa \
            .

          # Compute SHA-256 checksum
          cd /tmp
          sha256sum policies.tar.gz > policies.tar.gz.sha256
          echo "Bundle size: $(wc -c < policies.tar.gz) bytes"
          echo "SHA-256: $(cat policies.tar.gz.sha256)"

          # Verify the bundle is a valid tar.gz
          tar -tzf policies.tar.gz | grep -c "\.rego$"
          echo "rego files in bundle"

      - name: Generate SBOM (SUP-004)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: /tmp/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Create release if it doesn't exist
          if ! gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            PRERELEASE_FLAG=""
            if echo "${TAG}" | grep -q "\-rc\."; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --title "Platform Compliance ${TAG}" \
              --notes "Release ${TAG}. See CHANGELOG.md for details." \
              ${PRERELEASE_FLAG}
            echo "Created release ${TAG}"
          fi

          # Upload bundle, checksum, and SBOM as release assets
          gh release upload "${TAG}" \
            /tmp/policies.tar.gz \
            /tmp/policies.tar.gz.sha256 \
            /tmp/sbom.cdx.json \
            --repo "${{ github.repository }}" \
            --clobber

          echo "✓ Bundle uploaded to release ${TAG}"
          gh release view "${TAG}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name'

  build-forge:
    name: "Build and publish forge binaries"
    runs-on: ubuntu-latest
    needs: package-bundle
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout at tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/forge/go.mod
          cache-dependency-path: tools/forge/go.sum

      - name: Build forge binaries
        working-directory: tools/forge
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT}"
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/forge_Linux_x86_64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/forge_Darwin_x86_64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/forge_Darwin_arm64 .
          cd dist && sha256sum forge_* > forge_checksums.txt
          echo "Binaries built:"
          ls -lh

      - name: Upload forge binaries to release
        working-directory: tools/forge/dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            forge_Linux_x86_64 \
            forge_Darwin_x86_64 \
            forge_Darwin_arm64 \
            forge_checksums.txt \
            --repo ${{ github.repository }} \
            --clobber
