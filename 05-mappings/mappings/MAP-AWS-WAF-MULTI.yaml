# Mappings: AWS Well-Architected Framework → multiple domains
#
# Source: SRC-AWS-WAF-2024
# Domains: SEC, OBS, BAK, NET, RUN
# Populated: 2026-07-08
#
# The WAF is adapted (not normative): cloud-native guidance is interpreted
# for self-hosted containerised services. WAF question IDs verified against
# the 2024 edition: REL 06/09/11, OPS 05/06/08, SEC 01/05.

source_id: SRC-AWS-WAF-2024

mappings:
  - id: MAP-AWS-WAF-SEC-001
    source_id: SRC-AWS-WAF-2024
    source_clause: "SEC 01 — How do you securely operate your workload? Best practice: separate duties and enforce least privilege; track secrets in a secrets manager."
    source_clause_text: >
      Keep credentials and secrets out of code, configuration files, and
      any repository. Use a secrets management service.
    control_id: SEC-001
    rationale: >
      AWS WAF Security Pillar's secure operations practices directly include
      keeping secrets out of source code. SEC-001 implements this as an
      enforceable control: no plaintext secrets in any repository file.
    mapping_type: adopted
    mapped_date: "2026-07-08"
    mapped_by: platform-team

  - id: MAP-AWS-WAF-BAK-001
    source_id: SRC-AWS-WAF-2024
    source_clause: "REL 09 — How do you back up data? Best practices: identify assets to back up; define backup frequency and retention; test restore procedures."
    source_clause_text: >
      Back up data, applications, and configuration to meet recovery objectives.
      Test backup and restore processes at a cadence appropriate to recovery
      objectives.
    control_id: BAK-001
    rationale: >
      AWS WAF Reliability Pillar REL 9 directly requires backup planning with
      defined RTO/RPO and periodic restoration testing. BAK-001 adopts these
      requirements and operationalises them as a service contract declaration,
      making backup policy machine-readable and continuously auditable.
    mapping_type: adopted
    mapped_date: "2026-07-08"
    mapped_by: platform-team

  - id: MAP-AWS-WAF-OBS-001
    source_id: SRC-AWS-WAF-2024
    source_clause: "OPS 06 — How do you mitigate deployment risks? Best practice: use deployment strategies that allow testing and validation before full rollout (plan before apply)."
    source_clause_text: >
      Design your workload so that it provides the information necessary for
      you to understand its internal state across all components.
    control_id: OBS-001
    rationale: >
      WAF Operational Excellence Pillar OPS 6 requires workloads to expose
      health information. OBS-001 implements this as a concrete requirement:
      every service must declare and implement a health check, verified at
      deployment time.
    mapping_type: adopted
    mapped_date: "2026-07-08"
    mapped_by: platform-team

  - id: MAP-AWS-WAF-OBS-002
    source_id: SRC-AWS-WAF-2024
    source_clause: "OPS 08 — How do you implement observability in your workload? Best practice: instrument your workload to emit logs in structured, correlated format."
    source_clause_text: >
      Implement observability including logging, structured log formats,
      and correlation identifiers to enable effective operations.
    control_id: OBS-002
    rationale: >
      WAF Operational Excellence OPS 4 recommends structured logging and
      correlation identifiers. OBS-002 makes these a mandatory requirement
      for all platform services, specifying the minimum required fields
      (timestamp, level, service, correlation_id).
    mapping_type: extended
    mapped_date: "2026-07-08"
    mapped_by: platform-team

  - id: MAP-AWS-WAF-NET-001
    source_id: SRC-AWS-WAF-2024
    source_clause: "SEC 05 — How do you protect your network resources? Best practice: control traffic at all layers using security groups, NACLs, and firewall rules."
    source_clause_text: >
      Control traffic at all layers. Define network topology with defense in
      depth. Restrict access to only required resources.
    control_id: NET-001
    rationale: >
      WAF Security Pillar SEC 5 requires explicit network access control.
      NET-001 implements the declaration requirement: any externally exposed
      service must explicitly declare its ingress policy, making the intended
      network boundary machine-readable and auditable.
    mapping_type: adopted
    mapped_date: "2026-07-08"
    mapped_by: platform-team

  - id: MAP-AWS-WAF-RUN-003
    source_id: SRC-AWS-WAF-2024
    source_clause: "REL 06 — How do you monitor workload resources? Best practice: monitor all components to detect failures and enable automated recovery."
    source_clause_text: >
      Allocate sufficient capacity to meet your workload demands and monitor
      resource utilization to prevent service degradation.
    control_id: RUN-003
    rationale: >
      WAF Reliability Pillar capacity management practices require that services
      declare and monitor resource consumption. RUN-003 implements this as a
      requirement to declare explicit CPU and memory limits in deployment
      configuration, preventing noisy-neighbour resource exhaustion.
    mapping_type: derived
    mapped_date: "2026-07-08"
    mapped_by: platform-team
