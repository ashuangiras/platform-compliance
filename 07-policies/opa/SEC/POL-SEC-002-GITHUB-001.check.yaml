id: POL-SEC-002-GITHUB-001
title: "GitHub secret scanning and push protection are both enabled"
binding_ids:
  - BIND-SEC-002-GITHUB
engine: opa
file_path: "07-policies/opa/SEC/POL-SEC-002-GITHUB-001.rego"
pass_criteria: >
  repository.security_and_analysis.secret_scanning.status == "enabled" AND
  repository.security_and_analysis.secret_scanning_push_protection.status == "enabled"
fail_criteria: >
  Either secret scanning or push protection has status != "enabled".
evidence_type: github-secret-scanning-config
severity: high
introduced_date: "2026-07-08"
status: active
