id: POL-SUP-002-DOCKER-001
title: "All container image references use immutable version tags or digests"
binding_ids:
  - BIND-SUP-002-DOCKER
engine: opa
file_path: "07-policies/opa/SUP/POL-SUP-002-DOCKER-001.rego"
pass_criteria: >
  All image references found in Dockerfiles, docker-compose files, and Terraform
  Docker provider resources use either a content-addressable digest (sha256:...)
  or an immutable semantic version tag containing at least one digit.
  result: not_applicable if no image references are found.
fail_criteria: >
  One or more image references use 'latest', an empty tag, or a known mutable
  named tag (stable, current, edge, main, master, develop, etc.).
evidence_type: image-tag-scan
severity: high
introduced_date: "2026-07-08"
status: active
