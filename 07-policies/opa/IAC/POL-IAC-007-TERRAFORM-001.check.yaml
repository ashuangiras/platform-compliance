id: POL-IAC-007-TERRAFORM-001
title: "integrations/ Vault KV credential injection component must be present"
binding_ids: [BIND-IAC-007-TERRAFORM]
engine: opa
file_path: "07-policies/opa/IAC/POL-IAC-007-TERRAFORM-001.rego"
input_file: iac-terraform.json
pass_criteria: >
  An integrations/ directory exists at the repository root and contains
  at least one .tf file. This component must write all service credentials
  to Vault KV at secret/platform/*.
fail_criteria: >
  No integrations/ directory found, indicating credentials are not being
  centrally managed via Vault KV.
evidence_type: terraform-file-check
severity: critical
