id: POL-IAC-006-TERRAFORM-001
title: "deploy.sh automated deployment script must be present"
binding_ids: [BIND-IAC-006-TERRAFORM]
engine: opa
file_path: "07-policies/opa/IAC/POL-IAC-006-TERRAFORM-001.rego"
input_file: iac-terraform.json
pass_criteria: >
  A deploy.sh file exists at the repository root or in scripts/.
  It must implement a two-phase terraform apply with health gates between phases.
fail_criteria: >
  No deploy.sh found. Deployment requires manual terraform commands,
  violating the single-script automation requirement.
evidence_type: terraform-file-check
severity: high
introduced_date: "2026-07-11"
status: active
