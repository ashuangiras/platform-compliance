# collector-map.yaml — Maps OPA input file names to the collector scripts that produce them.
#
# forge reads this file at runtime to determine which script to invoke for each input file.
# When you add a new collector (e.g. collect-rust-info.sh → rust-info.json), add an entry
# here. No changes to forge's Go code are required.
#
# Format:
#   <input-file-name>:
#     script: <script filename in 07-policies/scripts/>
#     interpreter: bash | python3   (default: bash)
#
# The script is invoked with the target repository directory as the working directory.

src-branch-protection.json:
  script: collect-github-branch-protection.sh
  interpreter: bash

sec-security-settings.json:
  script: collect-github-security-settings.sh
  interpreter: bash

# Aliases: some policies use alternate names for the same collector output
acc-security.json:
  script: collect-github-security-settings.sh
  interpreter: bash

aud-security.json:
  script: collect-github-security-settings.sh
  interpreter: bash

sec-vuln-sla.json:
  script: collect-github-security-settings.sh
  interpreter: bash

dockerfile-info.json:
  script: collect-dockerfile-info.sh
  interpreter: bash

docker-info.json:
  script: collect-dockerfile-info.sh
  interpreter: bash

go-info.json:
  script: collect-go-info.sh
  interpreter: bash

node-info.json:
  script: collect-node-info.sh
  interpreter: bash

python-info.json:
  script: collect-python-info.sh
  interpreter: bash

frontend-info.json:
  script: collect-frontend-info.sh
  interpreter: bash

iac-terraform.json:
  script: collect-terraform-info.sh
  interpreter: bash

actions-info.json:
  script: collect-workflow-actions.sh
  interpreter: bash

agent-info.json:
  script: collect-agent-info.py
  interpreter: python3

# Placeholders — these collectors are not yet implemented.
# When implemented, add the script name and interpreter.
chg-pr-context.json:
  script: ""
  interpreter: bash

# IAC-002 (P0-3) Terraform plan-review evidence. Requires PR context + `gh` (PR
# comments/reviews), which forge's per-repo-dir invocation cannot supply — so there
# is no standalone script. Produced by collect-all-inputs.py from PR comments and
# reviews; yields {pr_context: false} (⇒ not_applicable) when there is no PR
# context or the repo is not a terraform-root.
iac-plan-review.json:
  script: ""
  interpreter: bash

chg-release.json:
  script: ""
  interpreter: bash

doc-files.json:
  script: ""
  interpreter: bash

lic-info.json:
  script: ""
  interpreter: bash

src-codeowners.json:
  script: ""
  interpreter: bash

# SEC-001 secret-scan input (DEFECT-1). collect-github-security-settings.sh emits
# the SEC-001 schema (scan_tool, scan_tool_version, findings, github_alerts_open)
# alongside the SEC-002/003/SUP-003 fields, so forge can produce this input without
# a code change. Previously mapped to "" (no collector) → SEC-001 was not_applicable.
sec-secrets.json:
  script: collect-github-security-settings.sh
  interpreter: bash
