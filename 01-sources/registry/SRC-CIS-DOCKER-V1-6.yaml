notes: >
  The CIS Docker Benchmark is used as a normative source for container security
  and runtime controls. The platform applies the benchmark's "Level 1 — Docker"
  profile as the baseline, which represents the minimum security configuration
  for all containerised services.

  Level 2 recommendations are deferred for initial platform phase. An ADR will
  be created once the container runtime controls are fully specified.

