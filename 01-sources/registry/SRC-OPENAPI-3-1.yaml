notes: >
  The OpenAPI Specification (OAS) defines a standard, language-agnostic interface
  to HTTP APIs. Version 3.1.0 aligns with JSON Schema 2020-12 and is the current
  stable version. Platform controls API-001 (spec required), API-002 (versioning),
  and API-003 (breaking change detection) are all derived from this standard.
