notes: >
  The Model Context Protocol (MCP) standardizes how AI agents connect to external tools and
  data via MCP servers. Agent configurations declare these servers (in VS Code, via
  .vscode/mcp.json).

  Platform control mappings:
  - AGT-003 (secure MCP configuration): the MCP config must be valid and must NOT embed
    credentials. Secrets belong in inputs/environment variables (VS Code `${input:…}` /
    `${env:…}` references), never as literal tokens in the committed config. Servers should be
    trusted/pinned. This intersects the SEC domain (no plaintext secrets in repositories).
  - The spec's authorization and transport-security guidance underpins the requirement that
    remote servers use vetted endpoints and that credentials are never checked in.
