notes: >
  The W3C standard defining success criteria for making web content accessible to
  people with disabilities. WCAG 2.2 introduces nine new success criteria (SC 1.3.6,
  2.4.11 through 2.4.13, 2.5.7, 2.5.8, 3.2.6, 3.3.7, 3.3.8) over WCAG 2.1.

  Platform control mappings:
  - SEC-011 (bundle size budget): excessively large JavaScript bundles degrade
    perceived performance on low-bandwidth connections and assistive technology
    environments, impairing accessibility. WCAG 2.2 principle 1 (Perceivable) and
    principle 3 (Understandable) establish expectations for responsive, usable
    interfaces.
