notes: >
  The CNCF Platform Engineering Maturity Model describes five maturity levels
  (Provisional, Operational, Scalable, Optimizing, and an implicit Aspirational
  level) across dimensions of investment, adoption, interfaces, operations,
  and measurement.

  Role is "informative" because the model is a design reference for platform
  architecture decisions, not a source of specific technical controls. It
  informs the platform's approach to internal developer experience, service
  catalog design, and observability, but controls are derived from more specific
  sources (Google SRE, AWS WAF, OpenSSF).

  Relevant maturity model dimensions for the platform:
  - "Interfaces" dimension → informs service contract model (CAT domain)
  - "Measurement" dimension → informs OBS controls
  - "Operations" dimension → informs BAK and REL controls

