notes: >
  The Twelve-Factor App is a methodology for building software-as-a-service apps
  emphasising declarative configuration, stateless processes, explicit dependency
  declarations, and disposability. Factor II (Dependencies) underpins SUP-005
  (committed lockfile). Factor I (Codebase) and Factor X (Dev/prod parity)
  underpin ARC-001 (standard project layout).
