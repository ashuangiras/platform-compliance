applies_to:
  - QUA  # Code quality (ruff check, ruff format, mypy)

status: active

notes: >
  The canonical sources for idiomatic Python code quality:

  - PEP 8 (https://peps.python.org/pep-0008/) — Style Guide for Python Code
  - ruff (https://docs.astral.sh/ruff/) — extremely fast Python linter and formatter
    that enforces PEP 8 and a superset of flake8/isort rules
  - mypy (https://mypy.readthedocs.io/) — static type checker for Python

  Platform control mappings:
  - QUA-001 (linter): ruff check must exit 0
  - QUA-002 (formatting): ruff format --check must exit 0
  - QUA-004 (type checking): mypy must exit 0 (no QUA-003 for Python; Python has no
    compile step)
