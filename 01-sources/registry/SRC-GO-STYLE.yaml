name: Go Style (Effective Go + Go Code Review Comments + Uber Go Style Guide)
version: "2024"
publisher: The Go Authors / Uber Technologies
source_url: "https://go.dev/doc/effective_go"
retrieved_at: "2026-07-10"
registered_date: "2026-07-10"
