$schema: "../../../schemas/control.schema.yaml"

id: SEC-008
title: Self-hosted GitHub Actions runners require documented justification
domain: SEC
type: preventive
priority: P2
severity: high

statement: >
  GitHub Actions workflows must not use self-hosted runners (runs-on: self-hosted
  or runs-on: [self-hosted, ...]) unless a documented justification exists and the
  runner is registered in the platform's runner inventory. Every self-hosted runner
  usage must have a corresponding waiver or architectural decision record explaining
  why a GitHub-hosted runner is insufficient.

rationale: >
  Self-hosted runners are a significant supply chain risk. Unlike GitHub-hosted
  runners (ephemeral, fresh per-job, maintained by GitHub), self-hosted runners:
  - Persist state between jobs (cross-job and cross-workflow contamination)
  - Run on infrastructure the platform team must harden and patch
  - Can be compromised and used to intercept workflow secrets
  - Allow lateral movement from CI/CD to internal infrastructure if not isolated
  GitHub's own documentation explicitly recommends avoiding self-hosted runners
  for public repositories and strongly discourages them for sensitive pipelines.

mapped_standards:
  - source_id: SRC-GITHUB-SECURITY-HARDENING
    clause: "Avoiding the use of self-hosted runners in public repositories: persistence and access to secrets"
    mapping_note: >
      GitHub's security hardening guide explicitly recommends against self-hosted
      runners due to persistence between jobs and infrastructure management burden.
      SEC-008 operationalises this recommendation as a policy control.
  - source_id: SRC-CIS-CONTROLS-V8
    clause: "CIS Control 6 — Access Control Management: Safeguard 6.4 — Require MFA for externally-exposed management interfaces"
    mapping_note: >
      Self-hosted runners are management interfaces for the CI/CD pipeline.
      SEC-008 applies least-privilege and explicit justification requirements
      consistent with CIS Control 6 access management principles.

implementation_expectations: >
  Use only GitHub-hosted runners (ubuntu-latest, macos-latest, windows-latest)
  unless a documented exception exists.

  If a self-hosted runner is genuinely required:
  1. Create an ADR documenting why GitHub-hosted runners are insufficient
  2. Register the runner in the platform runner inventory (docs/infra/runners.yaml)
  3. Ensure the runner host is hardened per CIS benchmarks
  4. Ensure the runner environment is ephemeral (reset between jobs)
  5. Restrict the runner to specific repositories via runner groups

evidence_required:
  - type: github-actions-workflow
    description: >
      GitHub Actions workflow files parsed for runs-on values. Any
      self-hosted runner reference requires a documented justification.
    format: json

automation_status: automated
assessment_cadence: per-merge
failure_behavior: warn
lifecycle_status: active
introduced_date: "2026-07-10"

failure_applies_to:
  - merge_gate
  - release_gate
