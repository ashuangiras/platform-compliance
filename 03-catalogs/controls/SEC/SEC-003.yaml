$schema: "../../../schemas/control.schema.yaml"

id: SEC-003
title: Critical and high severity dependency vulnerabilities must be remediated within SLA
domain: SEC
type: detective
priority: P2
severity: high

statement: >
  All critical-severity dependency vulnerability alerts must be remediated or
  have an approved waiver within 7 calendar days of detection. All high-severity
  alerts must be remediated or have an approved waiver within 30 calendar days.

rationale: >
  Known vulnerabilities in unpinned or outdated dependencies represent exploitable
  attack surface. The remediation SLA creates a time-bound obligation to address
  known risks, preventing the accumulation of unresolved vulnerabilities that
  erodes the platform's security posture over time.

mapped_standards:
  - source_id: SRC-OPENSSF-SCORECARD-V2
    clause: "Vulnerabilities check"
    mapping_note: >
      Scorecard's Vulnerabilities check evaluates whether the repository has
      open vulnerability alerts from the OSV database. SEC-003 defines the
      SLA under which those alerts must be addressed.
  - source_id: SRC-OPENSSF-SLSA-V1
    clause: "Overview — Security Best Practices: All SLSA implementations MUST use industry security best practices, including promptly fixing known vulnerabilities in dependencies."
    mapping_note: >
      SLSA's supply chain security model includes requirements around addressing
      known vulnerabilities in build inputs.

implementation_expectations: >
  Dependabot security alerts (or equivalent from the tool enabled by SUP-003)
  must be monitored and actioned within the defined SLA:

  Critical (CVSS >= 9.0): 7 days to remediation or approved waiver
  High     (CVSS 7.0-8.9): 30 days to remediation or approved waiver
  Medium   (CVSS 4.0-6.9): 90 days (tracked but no gate impact in v1)
  Low      (CVSS < 4.0):   Tracked; no SLA in v1

  Remediation options:
  1. Update the dependency to a non-vulnerable version
  2. Apply a patch (if available and suitable)
  3. Obtain an approved waiver with documented rationale and compensating controls

  At the deployment gate, any unresolved critical alert without an approved
  waiver blocks deployment.

evidence_required:
  - type: dependency-vulnerability-alert-status
    description: >
      List of open dependency vulnerability alerts at assessment time, including
      severity, age, and remediation status.
    format: json

automation_status: automated
assessment_cadence: continuous
failure_behavior: block
failure_applies_to:
  - deployment_gate
  - continuous_audit

lifecycle_status: active
introduced_date: "2026-07-08"

notes: >
  The deployment gate check is: does any unresolved critical alert exist without
  an active waiver? High-severity alerts generate a warning at the deployment gate
  in v1 and become blocking in v2. This graduated enforcement gives teams time to
  build their remediation workflow.
