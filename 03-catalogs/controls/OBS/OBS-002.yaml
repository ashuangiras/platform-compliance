$schema: "../../../schemas/control.schema.yaml"

id: OBS-002
title: Services must emit structured logs with required fields
domain: OBS
type: directive
priority: P2
severity: medium

statement: >
  Every service deployed by the platform must emit application logs in a
  structured format (JSON). Each log entry must include at minimum: timestamp
  (ISO 8601), severity level, service name, and a correlation ID that can be
  used to trace a single request across service boundaries.

rationale: >
  Unstructured logs are human-readable but not machine-parseable. Without
  structured logs, automated log aggregation, alerting, and root cause analysis
  require fragile regex parsing that breaks when log formats change. Structured
  logging enables reliable automated processing of logs. The correlation ID is
  specifically required to enable distributed tracing: without it, debugging a
  failure that spans multiple services requires manually correlating timestamps,
  which is error-prone and slow under incident conditions.

mapped_standards:
  - source_id: SRC-GOOGLE-SRE
    clause: "[PLACEHOLDER: SRE book Chapter 12 — Effective Troubleshooting; correlation reference]"
    mapping_note: >
      SRE Chapter 12 emphasises that effective troubleshooting requires the
      ability to trace requests through the system. Correlation IDs in structured
      logs are the standard mechanism for this.
  - source_id: SRC-AWS-WAF-2024
    clause: "[PLACEHOLDER: AWS WAF OPS — How do you implement observability in your workload?]"
    mapping_note: >
      WAF operational excellence practices include structured logging as a
      key observability mechanism.

implementation_expectations: >
  Minimum required log fields:
  - timestamp:      ISO 8601 with timezone (e.g., "2026-07-08T14:30:00Z")
  - level:          Severity string (ERROR, WARN, INFO, DEBUG)
  - service:        Service name matching the service contract identifier
  - correlation_id: A string that is consistent across all log entries for a
                    single request. The HTTP X-Request-ID header (or equivalent)
                    is the recommended source.
  - message:        Human-readable description of the log event

  Recommended additional fields (not required in v1):
  - trace_id:       Distributed tracing ID (for future OBS maturity)
  - version:        Service version from OCI label

  Log destination:
  - Logs must be written to stdout/stderr (not to files inside the container)
  - The platform's log aggregation infrastructure (to be defined) will collect
    from stdout/stderr

evidence_required:
  - type: structured-log-format-attestation
    description: >
      Manual attestation from the service owner confirming that the service
      emits structured JSON logs with the required fields. Include a sample
      log entry demonstrating the format.
    format: text

automation_status: manual
assessment_cadence: per-release
failure_behavior: warn
failure_applies_to:
  - release_gate

scope_conditions:
  - condition: "service.type is defined"
    rationale: Applies to service-type repositories only.

lifecycle_status: active
introduced_date: "2026-07-08"

notes: >
  Manual attestation is accepted in v1 because automated log format verification
  requires a running service and log collection infrastructure that does not yet
  exist. This control is an automation target (OBS-002 moves to partially-automated
  in PROF-PLATFORM-V2 once log aggregation infrastructure exists).
