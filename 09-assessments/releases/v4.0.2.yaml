$schema: "../../schemas/release-record.schema.json"

# Release record for platform-compliance v4.0.2
# PATCH — clean re-cut of the v4.0.1 patch cycle on the DEFECT-6-fixed commit (d272770).
#
# The published v4.0.1 tag points at pre-DEFECT-6 commit 25a151a, whose tag-triggered
# release-gate FAILS (collect-all-inputs.py still hardcoded release_record: null, so
# CHG-002 could never pass). Per ADR-0010 this is NOT a breaking change — the enforcement
# fix is exactly what v4.0.1 already intended, delivered under an immutable, release-gate-
# green tag.
#
# Release immutability is preserved: the published v4.0.1 tag is NOT mutated or force-moved.
# v4.0.1 is marked superseded and the fix ships forward here in v4.0.2.

id: "v4.0.2"
schema_version: "1.0.0"

release_date: "2026-07-11"

change_record_ids:
  - CHG-20260711-068   # v4.0.2 clean re-cut delivering the DEFECT-6 fix under a green tag
  - CHG-20260711-067   # v4.0.1 patch cycle (DEFECT-1..6) — provenance chains back to it

gate_assessment_id: "ASSESS-PLATFORM-COMPLIANCE-20260711-068"

release_summary: >
  PATCH release — clean re-cut of the v4.0.1 patch cycle on commit d272770, which contains
  the DEFECT-6 (release_record) fix in collect-all-inputs.py. Bug fixes only: no new
  mandatory controls and no governance-object / schema / profile / OPA-policy changes.

  Why v4.0.2 exists: the published v4.0.1 tag points at pre-DEFECT-6 commit 25a151a, whose
  tag-triggered release-gate fails — collect-all-inputs.py hardcoded release_record: null
  while release_record_exists was true, so CHG-002 always reported gate_assessment_id and
  release_summary "missing" and blocked the tagged release. The collector now parses the
  release-record YAML and embeds it, so CHG-002 validates the real fields and the
  release-gate is green on d272770.

  v4.0.1 is SUPERSEDED because its tag predates the DEFECT-6 fix and its release-gate cannot
  pass. Per the maintainer's decision, release immutability is preserved: the published
  v4.0.1 tag is NOT mutated or force-moved — the fix ships forward in this v4.0.2 tag cut on
  the fixed commit. change_record_ids chains back to CHG-20260711-067 for provenance.

breaking_changes: false

released_by: platform-team
