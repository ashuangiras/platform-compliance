description: >
  Initial build of platform-compliance v1.0.0. Establishes the complete compliance
  backbone: standards source registry, platform taxonomy, control catalog (23 controls),
  compliance profiles, standard-to-control mappings, implementation bindings, OPA
  policy checks, evidence model, assessment model, reusable CI/CD workflows,
  and all governance schemas.

  This change record covers the entire v1.0.0 initial build as a single bootstrap
  record. From v1.0.1 onwards, individual changes will each have their own change record.

