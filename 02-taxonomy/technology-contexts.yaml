# Platform Technology Contexts
#
# Technology context identifiers used in implementation bindings (06-bindings/).
# A binding is specific to one technology context — it describes how a control
# is satisfied when the platform component uses that technology.
#
# When a repository uses multiple technology contexts (e.g., a service repo
# that uses both GitHub and Docker), the applicable bindings from each context
# are combined.

contexts:
  github:
    code: github
    description: >
      The repository is hosted on GitHub. Applicable to all platform repositories.
      Bindings in this context cover: branch protection, GitHub Actions, secret
      scanning, Dependabot, CODEOWNERS, repository settings.
    applies_when: "always (all platform repositories are GitHub-hosted)"

  terraform:
    code: terraform
    description: >
      The repository contains Terraform or OpenTofu code. Bindings in this context
      cover: module structure, provider pinning, fmt/validate, plan process, and
      module documentation.
    applies_when: "repository.type in ['terraform-module', 'terraform-root']"

  docker:
    code: docker
    description: >
      The repository builds or manages Docker images. Bindings in this context
      cover: Dockerfile structure, image labelling, non-root user, image pinning,
      and healthcheck declarations.
    applies_when: "repository declares has_container_images: true"

  runtime-linux:
    code: runtime-linux
    description: >
      The service runs on a Linux host managed by the platform. Bindings in this
      context cover: resource limits, process isolation, and host-level security.
    applies_when: "service.runtime == 'linux-host'"

  github-actions:
    code: github-actions
    description: >
      The repository uses GitHub Actions for CI/CD. Bindings in this context
      cover: workflow permissions, pinned action versions, secret usage in workflows,
      and required workflow steps.
    applies_when: "repository uses GitHub Actions (all platform repos)"

  go:
    code: go
    description: >
      The repository contains Go source code. Bindings in this context cover:
      golangci-lint / go vet static analysis, gofmt formatting, go build compilation,
      go test execution and coverage, and Go module hygiene (go.mod/go.sum).
    applies_when: "repository contains go.mod at the root or in a module directory"

  node:
    code: node
    description: >
      The repository contains Node.js / TypeScript source code. Bindings in this
      context cover: ESLint static analysis, prettier formatting, tsc type checking,
      test runner (jest/vitest) execution and coverage, and package manifest hygiene
      (package.json + lockfile).
    applies_when: "repository contains package.json at the root"

  python:
    code: python
    description: >
      The repository contains Python source code. Bindings in this context cover:
      ruff / pylint static analysis, black / ruff-format formatting, mypy type
      checking, pytest execution and coverage, and dependency manifest hygiene
      (pyproject.toml / requirements.txt + lockfile).
    applies_when: "repository contains pyproject.toml, setup.py, or requirements.txt"

  frontend:
    code: frontend
    description: >
      The repository builds a browser-facing web application. Bindings in this
      context cover: Content-Security-Policy declaration, bundle-size budgets,
      absence of production source maps, and accessibility (WCAG) checks. Layered
      on top of the node context for build/lint/test.
    applies_when: "repository.type == 'frontend-app'"

  agent:
    code: agent
    description: >
      The repository ships AI coding-agent configuration: repository instructions
      (copilot-instructions.md or AGENTS.md), custom agents (.github/agents/),
      file instructions (.github/instructions/), prompts (.github/prompts/), MCP
      server configuration (.vscode/mcp.json), and/or lifecycle hooks
      (.github/hooks/). Bindings in this context cover: single-sourced
      instructions, valid frontmatter, secure MCP configuration, description
      quality, least-privilege agent tools, instruction scoping, pre/post-flight
      discipline, safety hooks, and multi-agent routing.
    applies_when: "repository declares the 'agent' context (any agent configuration present)"

  vault:
    code: vault
    description: >
      The repository integrates with HashiCorp Vault for secret injection.
      Applicable to services that use Vault Agent or direct Vault API calls.
    applies_when: "repository declares the 'vault' context (Vault Agent or Vault API integration present)"

  consul:
    code: consul
    description: >
      The repository uses HashiCorp Consul for service configuration (KV store),
      service discovery, or service mesh (Consul Connect).
    applies_when: "repository declares the 'consul' context (Consul KV, service registration, or Connect in use)"

  authentik:
    code: authentik
    description: >
      The repository integrates with Authentik as the platform identity provider.
      Applicable to services that use Authentik OIDC/OAuth2 for authentication,
      the Authentik forward authentication proxy, or that configure Authentik
      applications/providers. Governs SSO integration, token validation, and
      role/group mapping from Authentik to service-level permissions.
    applies_when: "repository declares the 'authentik' context (OIDC integration, forward auth, or Authentik application configuration present)"
